<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UAT Runner</title>
<style>
  :root {
    --frame-bg: #15171C;
    --rail-bg: #1A1D24;
    --panel: #1E2128;
    --panel-2: #23272F;
    --line: #2C313B;
    --text: #E7E9EE;
    --text-dim: #9AA1AD;
    --text-faint: #6B7280;
    --accent: #FFB454;
    --accent-dim: rgba(255, 180, 84, 0.14);
    --done: #6BBF8A;
    --drawer-w: 360px;
    --mono: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--frame-bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Layout shell ---- */
  .shell {
    display: grid;
    grid-template-columns: 1fr var(--drawer-w);
    height: 100vh;
    width: 100vw;
    transition: grid-template-columns 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .shell.collapsed { grid-template-columns: 1fr 52px; }

  /* ---- Prototype stage ---- */
  .stage {
    position: relative;
    background: #0E0F12;
    overflow: hidden;
  }
  .stage iframe {
    border: 0;
    width: 100%;
    height: 100%;
    display: block;
    background: #fff;
  }
  .stage-empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.03em;
  }

  /* ---- Drawer ---- */
  .drawer {
    background: var(--rail-bg);
    border-left: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .drawer-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 14px 14px 18px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .brand-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .head-meta { min-width: 0; flex: 1; }
  .head-client {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .head-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .icon-btn {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text-dim);
    width: 30px; height: 30px;
    border-radius: 7px;
    cursor: pointer;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .icon-btn:hover { background: var(--panel-2); color: var(--text); }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn svg { width: 15px; height: 15px; }

  /* progress */
  .progress {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .progress-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 9px;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .progress-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
  }
  .progress-track {
    height: 3px;
    border-radius: 3px;
    background: var(--line);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* task body */
  .task-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px 8px;
  }
  .task-step {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .task-title {
    font-size: 19px;
    line-height: 1.25;
    font-weight: 650;
    letter-spacing: -0.01em;
    margin: 0 0 12px;
    color: var(--text);
  }
  .task-instruction {
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--text-dim);
    margin: 0 0 20px;
  }
  .task-instruction p { margin: 0 0 10px; }
  .task-instruction p:last-child { margin-bottom: 0; }

  .focus-block {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 13px 15px 14px;
    margin-bottom: 16px;
  }
  .focus-head {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 9px;
  }
  .focus-list { margin: 0; padding: 0; list-style: none; }
  .focus-list li {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--text-dim);
    padding-left: 16px;
    position: relative;
    margin-bottom: 7px;
  }
  .focus-list li:last-child { margin-bottom: 0; }
  .focus-list li::before {
    content: "";
    position: absolute;
    left: 0; top: 9px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
  }

  .intro-note {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text-dim);
    background: var(--accent-dim);
    border: 1px solid rgba(255, 180, 84, 0.25);
    border-radius: 10px;
    padding: 13px 15px;
    margin-bottom: 18px;
  }

  /* nav */
  .nav {
    border-top: 1px solid var(--line);
    padding: 14px 18px 16px;
    flex-shrink: 0;
  }
  .nav-buttons {
    display: flex;
    gap: 9px;
    margin-bottom: 14px;
  }
  .btn {
    appearance: none;
    flex: 1;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13.5px;
    font-weight: 550;
    font-family: var(--sans);
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s, transform 0.08s;
    border: 1px solid var(--line);
  }
  .btn:active { transform: translateY(1px); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-prev { background: var(--panel); color: var(--text-dim); }
  .btn-prev:hover { background: var(--panel-2); color: var(--text); }
  .btn-next { background: var(--accent); color: #1A1206; border-color: var(--accent); }
  .btn-next:hover { filter: brightness(1.06); }
  .btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

  .dots {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    align-items: center;
  }
  .dot {
    appearance: none;
    border: 0;
    padding: 0;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--line);
    cursor: pointer;
    transition: background 0.15s, transform 0.12s;
  }
  .dot:hover { transform: scale(1.25); }
  .dot:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .dot.done { background: var(--done); }
  .dot.current { background: var(--accent); transform: scale(1.3); }

  .nav-hint {
    margin-top: 13px;
    font-size: 12px;
    line-height: 1.45;
    color: var(--text-faint);
  }

  /* ---- Collapsed rail ---- */
  .rail {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    gap: 16px;
    height: 100%;
  }
  .shell.collapsed .drawer-inner { display: none; }
  .shell.collapsed .rail { display: flex; }
  .rail-count {
    writing-mode: vertical-rl;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .rail-progress {
    flex: 1;
    width: 3px;
    border-radius: 3px;
    background: var(--line);
    position: relative;
    overflow: hidden;
  }
  .rail-progress-fill {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: var(--accent);
    border-radius: 3px;
    transition: height 0.3s ease;
  }

  .drawer-inner { display: flex; flex-direction: column; flex: 1; min-height: 0; }

  /* ---- Landing / error state ---- */
  .landing {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--frame-bg);
    z-index: 10;
  }
  .landing.show { display: flex; }
  .landing-card {
    max-width: 520px;
    width: 100%;
  }
  .landing-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .landing h1 {
    font-size: 26px;
    font-weight: 650;
    letter-spacing: -0.02em;
    margin: 0 0 10px;
  }
  .landing p {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
    margin: 0 0 22px;
  }
  .round-list { display: flex; flex-direction: column; gap: 8px; }
  .round-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    text-decoration: none;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    transition: background 0.15s, border-color 0.15s;
  }
  .round-link:hover { background: var(--panel-2); border-color: #3A404C; }
  .round-link-text .rl-client {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 3px;
  }
  .round-link-text .rl-title { font-size: 14.5px; font-weight: 550; color: var(--text); }
  .round-link-arrow { color: var(--text-faint); flex-shrink: 0; }
  .landing-err {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 18px;
  }

  /* ---- Responsive: narrow viewport drops drawer to bottom sheet ---- */
  @media (max-width: 720px) {
    .shell { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .shell.collapsed { grid-template-rows: 1fr 48px; grid-template-columns: 1fr; }
    .drawer { border-left: 0; border-top: 1px solid var(--line); max-height: 52vh; }
    .rail { flex-direction: row; padding: 0 14px; gap: 14px; }
    .rail-count { writing-mode: horizontal-tb; }
    .rail-progress { width: auto; height: 3px; flex: 1; }
    .rail-progress-fill { right: auto; bottom: 0; height: 100% !important; transition: width 0.3s ease; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  /* scrollbar */
  .task-scroll::-webkit-scrollbar { width: 9px; }
  .task-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 9px; border: 2px solid var(--rail-bg); }
</style>
</head>
<body>

  <!-- Landing / no-round / error state -->
  <div class="landing" id="landing">
    <div class="landing-card">
      <div class="landing-eyebrow" id="landingEyebrow">UAT Runner</div>
      <h1 id="landingTitle">Pick a test round</h1>
      <p id="landingDesc">Open the link your contact at Dauntless shared with you. If you have it, choose a round below.</p>
      <div class="round-list" id="roundList"></div>
      <div class="landing-err" id="landingErr"></div>
    </div>
  </div>

  <!-- Main shell -->
  <div class="shell" id="shell" style="display:none">
    <div class="stage">
      <div class="stage-empty" id="stageEmpty">loading prototype…</div>
      <iframe id="proto" title="Prototype under test" allow="clipboard-read; clipboard-write"></iframe>
    </div>

    <aside class="drawer" id="drawer">
      <!-- Collapsed rail -->
      <div class="rail" id="rail">
        <button class="icon-btn" id="expandBtn" aria-label="Show task panel" title="Show tasks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="rail-count" id="railCount">— / —</div>
        <div class="rail-progress"><div class="rail-progress-fill" id="railFill"></div></div>
      </div>

      <!-- Expanded content -->
      <div class="drawer-inner" id="drawerInner">
        <div class="drawer-head">
          <span class="brand-dot"></span>
          <div class="head-meta">
            <div class="head-client" id="headClient">—</div>
            <div class="head-title" id="headTitle">—</div>
          </div>
          <button class="icon-btn" id="collapseBtn" aria-label="Hide task panel" title="Collapse panel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>

        <div class="progress">
          <div class="progress-row">
            <span class="progress-label">Progress</span>
            <span class="progress-count" id="progressCount">— of —</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <div class="task-scroll" id="taskScroll">
          <div id="introWrap"></div>
          <div class="task-step" id="taskStep">Task 1</div>
          <h2 class="task-title" id="taskTitle">—</h2>
          <div class="task-instruction" id="taskInstruction">—</div>
          <div id="focusWrap"></div>
        </div>

        <div class="nav">
          <div class="nav-buttons">
            <button class="btn btn-prev" id="prevBtn">Back</button>
            <button class="btn btn-next" id="nextBtn">Next task</button>
          </div>
          <div class="dots" id="dots"></div>
          <div class="nav-hint">Talk us through what you're seeing and doing as you go — first impressions included.</div>
        </div>
      </div>
    </aside>
  </div>

<script>
(function () {
  "use strict";

  var state = { config: null, index: 0, done: {} };

  var el = function (id) { return document.getElementById(id); };

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  // Render a small amount of structured text as paragraphs (no HTML injection).
  function paragraphs(container, text) {
    container.textContent = "";
    String(text || "").split(/\n\s*\n/).forEach(function (chunk) {
      var p = document.createElement("p");
      p.textContent = chunk.trim();
      if (p.textContent) container.appendChild(p);
    });
  }

  function showLanding(opts) {
    opts = opts || {};
    el("shell").style.display = "none";
    el("landing").classList.add("show");
    if (opts.title) el("landingTitle").textContent = opts.title;
    if (opts.desc) el("landingDesc").textContent = opts.desc;
    if (opts.err) el("landingErr").textContent = opts.err;
  }

  function buildRoundList(rounds) {
    var list = el("roundList");
    list.textContent = "";
    (rounds || []).forEach(function (r) {
      var a = document.createElement("a");
      a.className = "round-link";
      a.href = "?round=" + encodeURIComponent(r.round);
      a.innerHTML =
        '<span class="round-link-text">' +
          '<span class="rl-client"></span>' +
          '<span class="rl-title"></span>' +
        '</span>' +
        '<span class="round-link-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>';
      a.querySelector(".rl-client").textContent = r.client || "";
      a.querySelector(".rl-title").textContent = r.title || r.round;
      list.appendChild(a);
    });
  }

  function renderTask() {
    var tasks = state.config.tasks;
    var i = state.index;
    var t = tasks[i];

    el("taskStep").textContent = "Task " + (i + 1);
    el("taskTitle").textContent = t.title || "Untitled task";
    paragraphs(el("taskInstruction"), t.instruction);

    // intro note only on first task
    var introWrap = el("introWrap");
    introWrap.textContent = "";
    if (i === 0 && state.config.intro) {
      var note = document.createElement("div");
      note.className = "intro-note";
      note.textContent = state.config.intro;
      introWrap.appendChild(note);
    }

    // focus list
    var fw = el("focusWrap");
    fw.textContent = "";
    if (t.focus && t.focus.length) {
      var block = document.createElement("div");
      block.className = "focus-block";
      var head = document.createElement("div");
      head.className = "focus-head";
      head.textContent = "Focus your feedback on";
      var ul = document.createElement("ul");
      ul.className = "focus-list";
      t.focus.forEach(function (f) {
        var li = document.createElement("li");
        li.textContent = f;
        ul.appendChild(li);
      });
      block.appendChild(head);
      block.appendChild(ul);
      fw.appendChild(block);
    }

    // progress
    var total = tasks.length;
    var pct = ((i + 1) / total) * 100;
    el("progressCount").textContent = (i + 1) + " of " + total;
    el("progressFill").style.width = pct + "%";
    el("railCount").textContent = (i + 1) + " / " + total;
    el("railFill").style.height = pct + "%";

    // nav buttons
    el("prevBtn").disabled = i === 0;
    var nextBtn = el("nextBtn");
    nextBtn.textContent = i === total - 1 ? "Finish" : "Next task";

    // dots
    var dots = el("dots");
    dots.textContent = "";
    for (var d = 0; d < total; d++) {
      (function (idx) {
        var dot = document.createElement("button");
        dot.className = "dot" + (idx === i ? " current" : (state.done[idx] ? " done" : ""));
        dot.setAttribute("aria-label", "Go to task " + (idx + 1));
        dot.title = tasks[idx].title || ("Task " + (idx + 1));
        dot.addEventListener("click", function () { goTo(idx); });
        dots.appendChild(dot);
      })(d);
    }

    el("taskScroll").scrollTop = 0;
  }

  function goTo(i) {
    var total = state.config.tasks.length;
    if (i < 0 || i >= total) return;
    state.done[state.index] = true;
    state.index = i;
    renderTask();
  }
  function next() {
    if (state.index < state.config.tasks.length - 1) goTo(state.index + 1);
    else { state.done[state.index] = true; renderTask(); }
  }
  function prev() { goTo(state.index - 1); }

  function setCollapsed(on) {
    el("shell").classList.toggle("collapsed", on);
  }

  function bootRound(cfg) {
    state.config = cfg;
    state.index = 0;
    state.done = {};

    el("landing").classList.remove("show");
    el("shell").style.display = "";

    el("headClient").textContent = cfg.client || "Dauntless";
    el("headTitle").textContent = cfg.title || cfg.round || "Test round";
    document.title = (cfg.title || "UAT") + " — UAT Runner";

    var frame = el("proto");
    var stageEmpty = el("stageEmpty");
    if (cfg.prototypeUrl) {
      frame.addEventListener("load", function () { stageEmpty.style.display = "none"; }, { once: true });
      frame.src = cfg.prototypeUrl;
    } else {
      stageEmpty.textContent = "no prototype URL set for this round";
    }

    renderTask();

    // wire controls
    el("nextBtn").addEventListener("click", next);
    el("prevBtn").addEventListener("click", prev);
    el("collapseBtn").addEventListener("click", function () { setCollapsed(true); });
    el("expandBtn").addEventListener("click", function () { setCollapsed(false); });

    document.addEventListener("keydown", function (e) {
      var tag = (e.target.tagName || "").toLowerCase();
      if (tag === "input" || tag === "textarea") return;
      if (e.key === "ArrowRight") next();
      else if (e.key === "ArrowLeft") prev();
      else if (e.key === "Escape") setCollapsed(!el("shell").classList.contains("collapsed"));
    });
  }

  function loadJSON(url) {
    return fetch(url, { cache: "no-store" }).then(function (r) {
      if (!r.ok) throw new Error(r.status + " " + r.statusText);
      return r.json();
    });
  }

  // ---- boot ----
  var round = getParam("round");

  if (!round) {
    loadJSON("rounds/index.json")
      .then(function (idx) { buildRoundList(idx.rounds || []); showLanding({}); })
      .catch(function () {
        showLanding({ title: "UAT Runner", desc: "Add ?round=<name> to the URL to start a test round." });
      });
    return;
  }

  loadJSON("rounds/" + round + ".json")
    .then(function (cfg) {
      if (!cfg.tasks || !cfg.tasks.length) throw new Error("Round has no tasks");
      bootRound(cfg);
    })
    .catch(function (err) {
      // try to still offer the directory
      loadJSON("rounds/index.json")
        .then(function (idx) { buildRoundList(idx.rounds || []); })
        .catch(function () {})
        .then(function () {
          showLanding({
            title: "Round not found",
            desc: "We couldn't load the round \u201c" + round + "\u201d. Check the link, or pick one below.",
            err: "rounds/" + round + ".json — " + err.message
          });
        });
    });
})();
</script>
</body>
</html>
